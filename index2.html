<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Twitch + 7TV</title>
  <style>
    #chat { max-height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; font-family: sans-serif; }
    img.emote { height: 24px; vertical-align: middle; }
    button { padding: 10px 20px; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>Chat Twitch con 7TV</h2>
<button id="loginBtn">Conectar con Twitch</button>
<div id="chat"></div>

<script src="tmi.min.js"></script>
<script>
  const clientId = 'of03md4jk4n8vthy9xxaw5yjfok27n'; // Reemplaza con tu Client ID de Twitch
  const redirectUri = window.location.origin + window.location.pathname; // Redirige a la misma página
  const scopes = 'chat:read chat:edit';

  const loginBtn = document.getElementById('loginBtn');
  loginBtn.addEventListener('click', () => {
    const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scopes)}`;
    window.location.href = authUrl;
  });

  // ----- Obtener token desde la URL después del login -----
  const hash = window.location.hash.substr(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');

  if(token) {
    loginBtn.style.display = 'none'; // Oculta el botón después de loguear
    
    let emoteMap = {};

    // ----- Función para cargar solo 7TV -----
    async function cargarTodosEmotes() {
      const res = await fetch("https://emotes.crippled.dev/v1/global/all");
      const data = await res.json();

      data.forEach(emote => {
        // Filtrar solo emotes de 7TV (provider === 2)
        if(emote.provider === 2) {
          const obj = emote.urls.find(u => u.size === "1x");
          if(obj && obj.url) {
            emoteMap[emote.code] = obj.url;
          }
        }
      });
    }

    // ----- Función para escapar caracteres especiales -----
    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ----- Función para renderizar los emotes en los mensajes -----
    function renderEmotes(msg) {
      Object.keys(emoteMap).forEach(code => {
        const url = emoteMap[code];
        const regex = new RegExp(`\\b${escapeRegex(code)}\\b`, "g");
        msg = msg.replace(regex, `<img class="emote" src="${url}" alt="${code}">`);
      });
      return msg;
    }
	
	async function cargarEmotesCanal7TV(twitchUserId) {
	  const res = await fetch(`https://7tv.io/v3/users/twitch/${twitchUserId}/emotes`);
	  const data = await res.json();

	  data.emotes.forEach(emote => {
		const obj = emote.urls.find(u => u.size === "1x");
		if(obj && obj.url) {
		  emoteMap[emote.name] = obj.url; // agrega al mismo emoteMap
		}
	  });
	}

    // ----- Inicializar chat solo después de cargar emotes -----
    async function initChat() {
	
	  const username = 'rubius';
      const channel = 'rubius';
	
      await cargarTodosEmotes(); // Espera a que los emotes 7TV estén listos
	  await cargarEmotesCanal7TV(channel); // canal específico		
      
      const client = new tmi.Client({
        options: { debug: true },
        connection: { reconnect: true, secure: true },
        identity: {
          username: username,
          password: 'oauth:' + token
        },
        channels: [ channel ]
      });

      client.connect();

      client.on('message', (channel, tags, message, self) => {
        if(self) return;
        const chatBox = document.getElementById('chat');
        const div = document.createElement('div');
        div.innerHTML = `<strong>${tags['display-name']}</strong>: ${renderEmotes(message)}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      });
    }

    // ----- Ejecutar -----
    initChat();
  }
</script>

</body>
</html>
