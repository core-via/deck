<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Grid</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

body{
  margin:0;
  background-color: black;
}

.grid{
  display:grid;
  width:100vw;
  height:100vh;

  /* 5 columnas iguales + 40% la última */
  grid-template-columns: repeat(3, 1fr) 40%;

  grid-template-rows: repeat(4, 1fr);
}

.cell{
  border:1px solid #999;
  display:flex;
  align-items:center;
  justify-content:center;  
}

/* Celda grande */
.big{
  grid-column:4;
  grid-row:1 / span 4;  
}

 .btn {
            background-color: #1f1f1f;
            color: #fff;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
			margin: 3px;
        }

        .btn:hover:active {
            background-color: #8f8f8f;
            border-color: #8f8f8f;
        }

/* Iframe de Twitch */
        iframe, #twitch-embed {
            width: 99%;
            height: 99%;
			border: none;
            border-radius: 8px;
        }

</style>
</head>

<body>

<div class="grid">

  <div class="cell big">  
	<iframe id="twitch-chat">
	</iframe>  
  </div>

  <div class="cell btn">1</div>
  <div class="cell btn">2</div>
  <div class="cell btn">3</div>
  
  <div class="cell btn">4</div>
  <div class="cell btn">5</div>
  <div class="cell btn">6</div>
  <div class="cell btn">7</div>
  
  <div class="cell btn">8</div> 
  <div class="cell btn">9</div>
  <div class="cell btn">10</div>
  <div class="cell btn">11</div>
  <div class="cell btn">
	<span class="material-icons" style="font-size:60px;">settings</span>
  </div>

</div>

	
   <script>
document.addEventListener("DOMContentLoaded", function() {
    const params = new URLSearchParams(window.location.search);
    const channel = params.get("channel");		
    const domain = "core-via.github.io";
	//const domain = "localhost";
    const iframe = document.getElementById("twitch-chat");
    iframe.src = `https://www.twitch.tv/embed/${channel}/chat?darkpopout&parent=${domain}&theme=dark`;
});
</script>

</body>
</html>
